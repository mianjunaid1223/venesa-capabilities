name: Update Registry

on:
  push:
    branches: [main]
    paths-ignore:
      - registry.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate registry.json
        run: node scripts/generate-registry.js
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME:   ${{ github.ref_name }}

      - name: Commit and push registry.json
        run: |
          git config user.name  "venesa-bot"
          git config user.email "bot@venesa.app"
          git add registry.json
          if git diff --cached --quiet; then
            echo "registry.json unchanged — nothing to commit."
          else
            git commit -m "chore: update registry.json [skip ci]"
            git push origin HEAD:main
          fi
