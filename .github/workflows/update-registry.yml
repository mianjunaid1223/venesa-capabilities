name: Update Registry

on:
  push:
    branches: [main]
  workflow_dispatch:      # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a token that can push back to protected main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate registry.json
        run: node scripts/generate-registry.js
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME:   ${{ github.ref_name }}

      - name: Commit registry.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update registry.json [skip ci]'
          file_pattern: registry.json
          skip_dirty_check: false
          commit_user_name:  venesa-bot
          commit_user_email: bot@venesa.app
          commit_author:     venesa-bot <bot@venesa.app>
